http:
  routers:
    example:
      rule: Host(`example.com`) && PathPrefix(`/`)
      entryPoints:
        - websecure
      middlewares:
        - redirect-to-https
      service: example
      tls:
        certResolver: letsencrypt
  middlewares:
    redirect-to-https:
      redirectscheme:
        permanent: true
        scheme: https
  services:
    example:
      loadBalancer:
        servers:
          - url: http://abcdef123456:9001
          - url: http://fedcba654321:9001
        healthCheck:
          path: /health
          interval: 10s
          timeout: 1s
        sticky:
          cookie:
            name: example_sticky
            secure: true
            httpOnly: true
            sameSite: strict
            maxAge: 86400
tcp:
  routers:
    example-xmpp:
      rule: HostSNI(`*`)
      service: example-xmpp
      entryPoints:
        - xmpp
      tls:
        passthrough: true
  services:
    example-xmpp:
      loadBalancer:
        servers:
          - address: abcdef123456:5222
          - address: fedcba654321:5222
udp:
  routers:
    example-dns:
      entryPoints:
        - udp
      service: example-dns
  services:
    example-dns:
      loadBalancer:
        servers:
          - address: abcdef123456:53
          - address: fedcba654321:53
